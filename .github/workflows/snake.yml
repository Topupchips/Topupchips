name: Generate contribution snake

on:
  # Refresh once a day so the snake tracks new commits
  schedule:
    - cron: "0 0 * * *"
  # Run manually from the Actions tab
  workflow_dispatch:
  # Also regenerate after README / workflow updates
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Generate snake SVGs (space palette)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#38BDF8&color_dots=#020617,#0C4A6E,#0369A1,#0EA5E9,#7DD3FC
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#7DD3FC&color_dots=#020617,#164E63,#0E7490,#22D3EE,#A5F3FC

      - name: Push snake SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
